<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>TRL</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <link data-trunk rel="copy-dir" href="assets"/>
    <script>
      document.addEventListener("click", () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        }
      });
    </script>
  </body>
</html>
